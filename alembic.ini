[alembic]
script_location = migrations
prepend_sys_path = src
# URL is injected from ALEMBIC_DATABASE_URL in env.py; this is only a fallback.
sqlalchemy.url = postgresql+psycopg://foryou:foryou@localhost:5432/foryou

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
